<!DOCTYPE html>
<html lang="do">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lorhels CV</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @media print {
            .no-print { display: none !important; }
            body { background: white; padding: 0; }
            .cv-container { box-shadow: none; border: none; width: 100%; max-width: 100%; margin: 0; }
        }
        .animate-fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">

    <!-- Navegación -->
    <nav class="bg-indigo-900 text-white p-4 shadow-xl no-print">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black tracking-tighter cursor-pointer" onclick="window.location.reload()">
                LORHELS<span class="text-indigo-400">-CV</span>
            </h1>
            <div id="auth-status" class="flex items-center gap-4">
                <div id="role-display" class="text-[10px] font-bold bg-indigo-800 px-3 py-1 rounded-full border border-indigo-700 uppercase">Cargando...</div>
                <button id="logout-btn" onclick="location.reload()" class="hidden text-xs bg-red-500/20 text-red-300 hover:bg-red-500 hover:text-white px-3 py-1 rounded transition-all">Salir</button>
            </div>
        </div>
    </nav>

    <!-- Contenedor Principal -->
    <main id="app-container" class="container mx-auto mt-6 px-4 pb-32">
        <div class="flex justify-center items-center h-64">
            <div class="animate-spin rounded-full h-12 w-12 border-4 border-indigo-500 border-t-transparent"></div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        // NUEVO: Importamos las funciones de seguridad reales
        import { getAuth, signInAnonymously, onAuthStateChanged, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, getDocs, collection, query, addDoc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDE0BPfySfOJTOPLGdCnENlHVEyX6wJusU",
            authDomain: "lorhels-cv.firebaseapp.com",
            projectId: "lorhels-cv",
            storageBucket: "lorhels-cv.firebasestorage.app",
            messagingSenderId: "769611552220",
            appId: "1:769611552220:web:03350cab69f08d7622eb19"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'lorhels-cv'; 

        let currentUser = null; 

        // --- SISTEMA DE SESIONES INTELIGENTE ---
        async function init() {
            try {
                // Firebase detecta automáticamente si alguien ya inició sesión antes
                onAuthStateChanged(auth, async (user) => {
                    const params = new URLSearchParams(window.location.search);
                    const cvId = params.get('cv');

                    if (user && !user.isAnonymous) {
                        // 1. Hay un usuario real logueado. Buscamos sus datos en Firestore.
                        const userDoc = await getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'usuarios_sistema', user.uid));
                        
                        if (userDoc.exists()) {
                            let uData = userDoc.data();
                            
                            // Revisamos si su plan PRO ya expiró
                            if (uData.plan === 'pro' && uData.expiracion_plan) {
                                const ahora = new Date().getTime();
                                if (ahora > uData.expiracion_plan) {
                                    uData.plan = 'gratis';
                                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'usuarios_sistema', user.uid), { plan: 'gratis' });
                                    alert("⏳ Tu plan PRO ha expirado tras 30 días. Has vuelto al plan Básico gratuito.");
                                }
                            }

                            currentUser = { id: user.uid, ...uData };
                            
                            // Actualizamos el menú superior
                            const logoutBtn = document.getElementById('logout-btn');
                            logoutBtn.classList.remove('hidden');
                            logoutBtn.onclick = async () => { await signOut(auth); location.href = window.location.pathname; };
                            document.getElementById('role-display').innerText = uData.tipo.toUpperCase();
                            
                            // 2. ¿Qué hacer con este usuario?
                            if (cvId) {
                                // Si escanearon un QR y son Empresa/Admin, registramos visita y mostramos CV directo (sin pedir contraseña)
                                if(uData.tipo === 'empresa' || uData.tipo === 'admin') {
                                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'visitas'), {
                                        empresa_nombre: uData.nombre,
                                        empresa_email: uData.email,
                                        cv_id: cvId,
                                        fecha: new Date().toLocaleString(),
                                        timestamp: serverTimestamp()
                                    });
                                    loadCV(cvId);
                                } else {
                                    alert("Debes iniciar sesión con una cuenta de Empresa para ver este currículum.");
                                    await signOut(auth);
                                    location.reload();
                                }
                            } else {
                                // Si no hay QR, lo mandamos a su panel de control
                                if (currentUser.tipo === 'admin') renderAdminPanel();
                                else if (currentUser.tipo === 'empresa') renderEmpresaDashboard(currentUser);
                                else renderDashboard(currentUser, false);
                            }
                        } else {
                            renderWelcome();
                        }
                    } else {
                        // No hay usuario real. Iniciamos anónimo para poder leer datos básicos.
                        if (!user) await signInAnonymously(auth);
                        
                        // Si escaneó un QR, le pedimos contraseña de empresa. Si no, pantalla de bienvenida.
                        if (cvId) renderAccessForm(cvId); 
                        else renderWelcome();
                    }
                });
            } catch (e) { console.error(e); }
        }

        // --- PANTALLAS PRINCIPALES ---
        function renderWelcome() {
            document.getElementById('role-display').innerText = "Visitante";
            const container = document.getElementById('app-container');
            container.innerHTML = `
                <div class="max-w-5xl mx-auto py-16 text-center animate-fade-in">
                    <h2 class="text-6xl font-black mb-6 text-slate-800 tracking-tight">Potencia tu <span class="text-indigo-600">Carrera</span></h2>
                    <p class="text-slate-500 mb-12 text-xl max-w-2xl mx-auto">Crea un CV digital profesional con acceso vía QR para empresas y reclutadores.</p>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-8 max-w-4xl mx-auto">
                        <div onclick="renderAuthOption('admin')" class="bg-white p-8 rounded-3xl border hover:shadow-2xl transition-all cursor-pointer group">
                            <div class="w-14 h-14 bg-slate-100 rounded-2xl flex items-center justify-center mx-auto mb-4 group-hover:bg-slate-800 group-hover:text-white"><i class="fas fa-lock"></i></div>
                            <h3 class="font-black text-slate-700">ADMIN</h3>
                        </div>
                        <div onclick="renderAuthOption('usuario')" class="bg-white p-10 rounded-3xl border-2 border-indigo-100 shadow-xl hover:-translate-y-2 transition-all cursor-pointer group">
                            <div class="w-16 h-16 bg-indigo-100 text-indigo-600 rounded-2xl flex items-center justify-center mx-auto mb-4 group-hover:bg-indigo-600 group-hover:text-white"><i class="fas fa-user-tie text-2xl"></i></div>
                            <h3 class="font-black text-indigo-900">CANDIDATO</h3>
                        </div>
                        <div onclick="renderAuthOption('empresa')" class="bg-white p-8 rounded-3xl border hover:shadow-2xl transition-all cursor-pointer group">
                            <div class="w-14 h-14 bg-amber-50 text-amber-600 rounded-2xl flex items-center justify-center mx-auto mb-4 group-hover:bg-amber-600 group-hover:text-white"><i class="fas fa-building"></i></div>
                            <h3 class="font-black text-slate-700">EMPRESA</h3>
                        </div>
                    </div>
                </div>`;
        }

        window.renderAuthOption = (type) => {
            const container = document.getElementById('app-container');
            container.innerHTML = `
                <div class="max-w-md mx-auto py-10 animate-fade-in">
                    <button onclick="renderWelcome()" class="mb-6 text-slate-400 hover:text-indigo-600 flex items-center gap-2"><i class="fas fa-arrow-left"></i> Volver</button>
                    <div class="bg-white p-8 rounded-3xl shadow-2xl border">
                        <h2 class="text-2xl font-black mb-8 text-center uppercase tracking-widest text-slate-800">Portal ${type}</h2>
                        <div class="space-y-4">
                            <button onclick="renderLogin('${type}')" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold shadow-lg shadow-indigo-200">Iniciar Sesión</button>
                            ${type !== 'admin' ? `<button onclick="renderRegister('${type}')" class="w-full border-2 border-slate-900 text-slate-900 py-4 rounded-2xl font-bold">Crear Cuenta Nueva</button>` : ''}
                        </div>
                    </div>
                </div>`;
        };

        //window.renderAuthOption = (type) => {
            //const container = document.getElementById('app-container');
            //container.innerHTML = `
                //<div class="max-w-md mx-auto py-10 animate-fade-in">
                    //<button onclick="renderWelcome()" class="mb-6 text-slate-400 hover:text-indigo-600 flex items-center gap-2"><i class="fas fa-arrow-left"></i> Volver</button>
                    //<div class="bg-white p-8 rounded-3xl shadow-2xl border">
                        //<h2 class="text-2xl font-black mb-8 text-center uppercase tracking-widest text-slate-800">Portal ${type}</h2>
                        //<div class="space-y-4">
                            //<button onclick="renderLogin('${type}')" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold shadow-lg shadow-indigo-200">Iniciar Sesión</button>
                            //<button onclick="renderRegister('${type}')" class="w-full border-2 border-slate-900 text-slate-900 py-4 rounded-2xl font-bold">Crear Cuenta Nueva</button>
                        //</div>
                    //</div>
                //</div>`;
        //};

        // --- LOGIN SEGURO CON FIREBASE AUTH ---
        window.renderLogin = (type) => {
            document.getElementById('app-container').innerHTML = `
                <div class="max-w-md mx-auto py-10 animate-fade-in">
                    <button onclick="renderAuthOption('${type}')" class="mb-6 text-slate-400 hover:text-indigo-600 flex items-center gap-2"><i class="fas fa-arrow-left"></i> Atrás</button>
                    <div class="bg-white p-8 rounded-3xl shadow-2xl border">
                        <h2 class="text-xl font-bold mb-6 text-center">LOGIN ${type.toUpperCase()}</h2>
                        <form id="login-form" class="space-y-4">
                            <input type="email" id="log-email" placeholder="Correo Electrónico" required class="w-full p-4 bg-slate-50 border rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500">
                            <input type="password" id="log-pass" placeholder="Contraseña" required class="w-full p-4 bg-slate-50 border rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500">
                            <button type="submit" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold">ENTRAR</button>
                        </form>
                    </div>
                </div>`;
            
            document.getElementById('login-form').onsubmit = async (e) => {
                e.preventDefault();
                const btn = e.target.querySelector('button');
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Verificando...';
                
                try {
                    // Firebase revisa si la contraseña encriptada es correcta
                    const cred = await signInWithEmailAndPassword(auth, document.getElementById('log-email').value, document.getElementById('log-pass').value);
                    
                    // Comprobamos que el usuario esté entrando al portal correcto
                    const userDoc = await getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'usuarios_sistema', cred.user.uid));
                    if(userDoc.exists()) {
                        if(userDoc.data().tipo !== type && userDoc.data().tipo !== 'admin') {
                            alert("Esta cuenta pertenece a otro portal.");
                            await signOut(auth);
                            btn.innerHTML = 'ENTRAR';
                            return;
                        }
                    }
                    // Si todo está bien, recargamos. La función init() detectará la sesión y abrirá el panel.
                    location.reload();
                } catch(error) {
                    alert("Correo o contraseña incorrectos.");
                    btn.innerHTML = 'ENTRAR';
                }
            };
        };

        // --- REGISTRO SEGURO CON FIREBASE AUTH ---
        window.renderRegister = (type) => {
            document.getElementById('app-container').innerHTML = `
                <div class="max-w-md mx-auto py-10 animate-fade-in">
                    <button onclick="renderAuthOption('${type}')" class="mb-6 text-slate-400 hover:text-indigo-600 flex items-center gap-2"><i class="fas fa-arrow-left"></i> Atrás</button>
                    <div class="bg-white p-8 rounded-3xl shadow-2xl border">
                        <h2 class="text-xl font-bold mb-6 text-center uppercase">Registro ${type}</h2>
                        <form id="reg-form" class="space-y-4">
                            <input type="text" id="reg-name" placeholder="${type === 'empresa' ? 'Nombre de la Empresa' : 'Nombre Completo'}" required class="w-full p-4 bg-slate-50 border rounded-2xl">
                            <input type="email" id="reg-email" placeholder="Email" required class="w-full p-4 bg-slate-50 border rounded-2xl">
                            <input type="password" id="reg-pass" placeholder="Contraseña segura" required class="w-full p-4 bg-slate-50 border rounded-2xl" minlength="6">
                            <button type="submit" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold">CREAR CUENTA</button>
                        </form>
                    </div>
                </div>`;
                
            document.getElementById('reg-form').onsubmit = async (e) => {
                e.preventDefault();
                const btn = e.target.querySelector('button');
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creando...';
                
                try {
                    // 1. Creamos el usuario encriptado en el sistema de Firebase Auth
                    const cred = await createUserWithEmailAndPassword(auth, document.getElementById('reg-email').value, document.getElementById('reg-pass').value);
                    
                    // 2. Guardamos su información pública usando su ID único de Auth
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'usuarios_sistema', cred.user.uid), {
                        nombre: document.getElementById('reg-name').value,
                        email: document.getElementById('reg-email').value,
                        tipo: type,
                        plan: 'gratis',
                        timestamp: serverTimestamp()
                    });
                    
                    alert("¡Cuenta segura creada con éxito!");
                    // Recargamos para que init() lo mande directo a su dashboard sin pedirle login de nuevo
                    location.reload(); 
                } catch(error) {
                    alert("Error: " + error.message);
                    btn.innerHTML = 'CREAR CUENTA';
                }
            };
        };

        // --- DASHBOARD DE LA EMPRESA ---
        async function renderEmpresaDashboard(user) {
            const container = document.getElementById('app-container');
            const isPremium = user.plan === 'pro' || user.tipo === 'admin';

            if (!isPremium) {
                container.innerHTML = `
                    <div class="max-w-5xl mx-auto py-12 animate-fade-in text-center">
                        <div class="bg-white p-12 rounded-3xl border mb-8 shadow-sm">
                            <div class="w-20 h-20 bg-amber-50 text-amber-500 rounded-full flex items-center justify-center mx-auto mb-6">
                                <i class="fas fa-lock text-3xl"></i>
                            </div>
                            <h2 class="text-3xl font-black mb-4 text-slate-800">Buscador Global Bloqueado</h2>
                            <p class="text-slate-500 mb-8 max-w-lg mx-auto text-lg">
                                Tu cuenta actual <b>(Gratis)</b> solo te permite ver los currículums cuando escaneas directamente el código QR de un candidato.
                            </p>
                            <button onclick="renderPaywall('empresa')" class="bg-amber-400 text-amber-900 px-8 py-4 rounded-2xl font-black shadow-lg hover:bg-amber-300 transition-colors uppercase tracking-widest inline-flex items-center gap-2">
                                <i class="fas fa-crown"></i> Desbloquear Premium por $19.99/mes
                            </button>
                        </div>
                    </div>`;
                return;
            }

            container.innerHTML = `
                <div class="max-w-6xl mx-auto py-8 animate-fade-in">
                    <div class="bg-white p-8 rounded-3xl border mb-8 flex flex-col md:flex-row justify-between items-center gap-6 shadow-sm">
                        <div>
                            <h2 class="text-3xl font-black flex items-center gap-3 text-slate-800">
                                <i class="fas fa-crown text-amber-400"></i> Portal Premium
                            </h2>
                            <p class="text-slate-500 mt-1">Bienvenido, ${user.nombre}. Busca y guarda el mejor talento.</p>
                        </div>
                        <div class="w-full md:w-1/2 relative">
                            <i class="fas fa-search absolute left-4 top-4 text-slate-400"></i>
                            <input type="text" id="buscador-talento" placeholder="Buscar por profesión, nombre o habilidad..." 
                                class="w-full pl-11 p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all" 
                                oninput="filtrarTalento(this.value)">
                        </div>
                    </div>

                    <div class="mb-6 flex gap-3 border-b pb-4">
                        <button onclick="mostrarTodos()" class="text-sm font-bold text-indigo-600 bg-indigo-50 px-5 py-2.5 rounded-xl hover:bg-indigo-100 transition-colors">Todos los Candidatos</button>
                        <button onclick="mostrarFavoritos()" class="text-sm font-bold text-pink-600 bg-pink-50 px-5 py-2.5 rounded-xl hover:bg-pink-100 transition-colors flex items-center gap-2">
                            <i class="fas fa-heart"></i> Mis Favoritos
                        </button>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6" id="cv-grid">
                        <div class="col-span-full text-center py-10 text-slate-400"><i class="fas fa-spinner fa-spin text-3xl mb-3"></i><p>Cargando talentos...</p></div>
                    </div>
                </div>`;

            window.allCVs = [];
            const cvsSnap = await getDocs(collection(db, 'artifacts', appId, 'public', 'data', 'cvs'));
            cvsSnap.forEach(d => { window.allCVs.push({ id: d.id, ...d.data() }); });

            if (!currentUser.favoritos) currentUser.favoritos = [];
            dibujarGridCVs(window.allCVs);
        }

        window.dibujarGridCVs = (cvList) => {
            const grid = document.getElementById('cv-grid');
            grid.innerHTML = '';
            
            if (cvList.length === 0) {
                grid.innerHTML = '<p class="text-slate-400 col-span-full text-center py-10 bg-slate-50 rounded-2xl border border-dashed">No se encontraron candidatos.</p>';
                return;
            }

            cvList.forEach(cv => {
                const esFavorito = currentUser.favoritos && currentUser.favoritos.includes(cv.id);
                const corazon = esFavorito ? 'fas text-pink-500' : 'far text-slate-300 hover:text-pink-400';

                grid.innerHTML += `
                    <div class="bg-white p-6 rounded-3xl border hover:shadow-xl transition-all relative group flex flex-col h-full">
                        <button onclick="toggleFavorito('${cv.id}')" class="absolute top-4 right-4 text-xl z-10 p-2 bg-white/80 rounded-full backdrop-blur-sm shadow-sm transition-transform hover:scale-110">
                            <i class="fa-heart ${corazon}" id="fav-icon-${cv.id}"></i>
                        </button>
                        
                        <div class="w-16 h-16 bg-indigo-50 text-indigo-600 rounded-2xl flex items-center justify-center mb-4 overflow-hidden border-2 border-transparent group-hover:border-indigo-100 transition-colors flex-shrink-0">
                            ${cv.foto ? `<img src="${cv.foto}" class="w-full h-full object-cover">` : `<i class="fas fa-user-tie text-2xl"></i>`}
                        </div>
                        
                        <div class="flex-1">
                            <h3 class="font-bold text-lg text-slate-800 leading-tight">${cv.nombre}</h3>
                            <p class="text-indigo-600 text-xs font-black mb-2 uppercase tracking-wide mt-1">${cv.profesion || 'Candidato'}</p>
                            <p class="text-[11px] text-slate-500 line-clamp-3 mb-4 leading-relaxed">${cv.objetivo || 'Sin descripción de perfil.'}</p>
                        </div>
                        
                        <button onclick="loadCV('${cv.id}')" class="w-full py-3 bg-slate-900 text-white rounded-xl text-xs font-black hover:bg-indigo-600 transition-colors mt-auto">VER PERFIL</button>
                    </div>`;
            });
        };

        window.filtrarTalento = (queryStr) => {
            const q = queryStr.toLowerCase();
            const filtrados = window.allCVs.filter(cv => 
                (cv.nombre && cv.nombre.toLowerCase().includes(q)) || 
                (cv.profesion && cv.profesion.toLowerCase().includes(q)) ||
                (cv.objetivo && cv.objetivo.toLowerCase().includes(q))
            );
            dibujarGridCVs(filtrados);
        };

        window.mostrarTodos = () => {
            document.getElementById('buscador-talento').value = '';
            dibujarGridCVs(window.allCVs);
        };

        window.mostrarFavoritos = () => {
            document.getElementById('buscador-talento').value = '';
            const favs = window.allCVs.filter(cv => currentUser.favoritos && currentUser.favoritos.includes(cv.id));
            dibujarGridCVs(favs);
        };

        window.toggleFavorito = async (cvId) => {
            if(!currentUser.favoritos) currentUser.favoritos = [];
            const index = currentUser.favoritos.indexOf(cvId);
            
            if(index > -1) {
                currentUser.favoritos.splice(index, 1); 
                document.getElementById('fav-icon-'+cvId).className = 'fa-heart far text-slate-300 hover:text-pink-400';
            } else {
                currentUser.favoritos.push(cvId); 
                document.getElementById('fav-icon-'+cvId).className = 'fa-heart fas text-pink-500';
            }

            try {
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'usuarios_sistema', currentUser.id), {
                    favoritos: currentUser.favoritos
                });
            } catch(e) { console.error("Error guardando favorito:", e); }
        };

        // --- DASHBOARD DEL CANDIDATO (Con editor de Habilidades) ---
        async function renderDashboard(targetUser, isAdminEditing = false) {
            const cvsSnap = await getDocs(collection(db, 'artifacts', appId, 'public', 'data', 'cvs'));
            let cv = null;
            cvsSnap.forEach(d => { if (d.data().email === targetUser.email) cv = {id: d.id, ...d.data()}; });

            let totalVisitas = 0;
            if (cv) {
                const visitasSnap = await getDocs(collection(db, 'artifacts', appId, 'public', 'data', 'visitas'));
                visitasSnap.forEach(d => { if (d.data().cv_id === cv.id) totalVisitas++; });
            }

            const isFullAccess = isAdminEditing || (currentUser && currentUser.tipo === 'admin');

            const container = document.getElementById('app-container');
            container.innerHTML = `
                <div class="max-w-5xl mx-auto py-8 animate-fade-in">
                    <div class="bg-white p-8 rounded-3xl border mb-10 flex flex-col md:flex-row justify-between items-center gap-6">
                        <div>
                            <h2 class="text-3xl font-black text-slate-800">Panel de Control ${isFullAccess ? '<span class="text-red-500 text-sm ml-2">(Modo Admin)</span>' : ''}</h2>
                            <p class="text-slate-400">Editando perfil de: ${targetUser.email}</p>
                        </div>
                        <div class="flex gap-4 flex-wrap">
                            ${isFullAccess ? `<button onclick="renderAdminPanel()" class="bg-slate-200 text-slate-800 px-6 py-3 rounded-2xl font-bold border">Volver a Consola</button>` : ''}
                            ${cv ? `
                                <button onclick="showVisitas('${cv.id}')" class="bg-amber-50 text-amber-600 px-6 py-3 rounded-2xl font-bold border border-amber-200 hover:bg-amber-100 flex items-center gap-2 transition-colors shadow-sm">
                                    <i class="fas fa-chart-line"></i> ${totalVisitas} VISTAS
                                </button>
                                
                                <button onclick="showQR('${cv.id}')" class="bg-slate-900 text-white px-6 py-3 rounded-2xl font-bold flex items-center gap-2"><i class="fas fa-qrcode"></i> MI QR</button>
                                <button onclick="loadCV('${cv.id}')" class="bg-indigo-50 text-indigo-600 px-6 py-3 rounded-2xl font-bold border border-indigo-100 flex items-center gap-2"><i class="fas fa-eye"></i> VISTA PREVIA</button>
                            ` : ''}

                    </div>

                    <form id="cv-full-form" class="space-y-10">
                        <div class="bg-white p-8 rounded-3xl border shadow-sm">
                            <h3 class="font-black text-indigo-600 mb-6 text-xs uppercase border-b pb-2"><i class="fas fa-user"></i> 1. Información General</h3>
                            
                            <div class="flex items-center gap-6 mb-6 bg-slate-50 p-4 rounded-2xl border border-dashed border-slate-300">
                                <img id="cv-foto-preview" src="${cv?.foto || 'https://via.placeholder.com/150'}" class="w-24 h-24 rounded-full object-cover border-4 border-white shadow-md">
                                <div class="flex-1">
                                    <label class="block text-xs font-bold text-slate-500 mb-1">URL de Foto de Perfil</label>
                                    <input type="url" id="cv-foto" value="${cv?.foto || ''}" placeholder="Ej: https://ejemplo.com/mifoto.jpg" class="w-full p-3 bg-white border rounded-xl text-sm" oninput="document.getElementById('cv-foto-preview').src = this.value || 'https://via.placeholder.com/150'">
                                </div>
                            </div>

                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                                <input type="text" id="cv-nombre" value="${cv?.nombre || targetUser.nombre}" placeholder="Nombre Completo" class="w-full p-4 bg-slate-50 border rounded-2xl">
                                <input type="text" id="cv-prof" value="${cv?.profesion || ''}" placeholder="Profesión / Título" class="w-full p-4 bg-slate-50 border rounded-2xl">
                                <input type="text" id="cv-dir" value="${cv?.direccion || ''}" placeholder="Dirección Residencial" class="w-full p-4 bg-slate-50 border rounded-2xl">
                                <input type="text" id="cv-tel" value="${cv?.telefono || ''}" placeholder="Teléfono" class="w-full p-4 bg-slate-50 border rounded-2xl">
                            </div>
                            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                                <div class="relative"><i class="fab fa-linkedin absolute left-4 top-5 text-indigo-400"></i><input type="text" id="cv-lin" value="${cv?.redes?.linkedin || ''}" placeholder="LinkedIn URL" class="p-4 pl-10 bg-slate-50 border rounded-2xl w-full text-xs"></div>
                                <div class="relative"><i class="fab fa-facebook absolute left-4 top-5 text-blue-500"></i><input type="text" id="cv-fb" value="${cv?.redes?.facebook || ''}" placeholder="Facebook URL" class="p-4 pl-10 bg-slate-50 border rounded-2xl w-full text-xs"></div>
                                <div class="relative"><i class="fab fa-instagram absolute left-4 top-5 text-pink-500"></i><input type="text" id="cv-ig" value="${cv?.redes?.instagram || ''}" placeholder="Instagram URL" class="p-4 pl-10 bg-slate-50 border rounded-2xl w-full text-xs"></div>
                            </div>
                        </div>

                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                            <div class="bg-white p-8 rounded-3xl border">
                                <h3 class="font-black text-indigo-600 mb-4 text-xs uppercase">2. Objetivo Profesional</h3>
                                <textarea id="cv-obj" rows="5" class="w-full p-4 bg-slate-50 border rounded-2xl">${cv?.objetivo || ''}</textarea>
                            </div>
                            <div class="bg-white p-8 rounded-3xl border">
                                <h3 class="font-black text-indigo-600 mb-4 text-xs uppercase">3. Información Personal</h3>
                                <div class="grid grid-cols-2 gap-4">
                                    <input type="text" id="cv-ced" value="${cv?.info_personal?.cedula || ''}" placeholder="Cédula" class="p-4 bg-slate-50 border rounded-2xl text-sm">
                                    <input type="text" id="cv-civil" value="${cv?.info_personal?.estado_civil || ''}" placeholder="Estado Civil" class="p-4 bg-slate-50 border rounded-2xl text-sm">
                                    <input type="text" id="cv-nac" value="${cv?.info_personal?.nacionalidad || ''}" placeholder="Nacionalidad" class="p-4 bg-slate-50 border rounded-2xl text-sm">
                                    <input type="text" id="cv-birth" value="${cv?.info_personal?.nacimiento || ''}" placeholder="F. Nacimiento" class="p-4 bg-slate-50 border rounded-2xl text-sm">
                                </div>
                            </div>
                        </div>

                        ${isFullAccess ? `
                            <div class="space-y-8">
                                ${renderEditorSection("Experiencia Laboral", "exp", cv?.experiencia, ["Empresa", "Cargo", "Tiempo", "Descripción"], false)}
                                ${renderEditorSection("Educación Académica", "edu", cv?.educacion, ["Centro", "Carrera", "Estado"], true)}
                                ${renderEditorSection("Cursos y Talleres", "cur", cv?.cursos, ["Nombre del Curso", "Lugar"], true)}
                                ${renderEditorSection("Diplomados", "dip", cv?.diplomados, ["Nombre del Diplomado", "Lugar"], true)}
                                ${renderEditorSection("Referencias Laborales", "ref", cv?.referencias, ["Nombre", "Empresa", "Cargo", "Teléfono"], false)}
                            </div>

                            <div class="bg-white p-8 rounded-3xl border shadow-sm mt-8">
                                <h3 class="font-black text-indigo-600 mb-6 text-xs uppercase border-b pb-2">Habilidades, Idiomas e Intereses</h3>
                                
                                <div class="mb-8">
                                    <div class="flex justify-between items-center mb-4">
                                        <label class="text-[10px] font-black text-slate-400">LISTA DE HABILIDADES</label>
                                        <button type="button" id="btn-add-hab" class="text-[10px] bg-slate-900 text-white px-3 py-1.5 rounded-full hover:bg-indigo-600 transition-colors shadow-sm">+ Añadir Habilidad</button>
                                    </div>
                                    <div id="hab-container" class="space-y-3">
                                        ${cv?.habilidades_lista?.map(h => `
                                            <div class="grid grid-cols-1 md:grid-cols-2 gap-2 p-4 bg-slate-50 rounded-2xl border relative animate-fade-in">
                                                <input type="text" placeholder="Habilidad (Ej: Liderazgo)" value="${h.nombre}" class="p-2 border rounded-lg text-sm hab-nom outline-none focus:border-indigo-400">
                                                <input type="text" placeholder="Descripción breve" value="${h.desc}" class="p-2 border rounded-lg text-sm hab-des outline-none focus:border-indigo-400">
                                                <button type="button" onclick="this.parentElement.remove()" class="absolute -top-2 -right-2 bg-red-500 text-white w-6 h-6 rounded-full text-xs shadow">×</button>
                                            </div>
                                        `).join('') || ''}
                                    </div>
                                </div>

                                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div class="space-y-2">
                                        <label class="text-[10px] font-black text-slate-400">IDIOMAS</label>
                                        <input type="text" id="cv-idi" value="${cv?.idiomas || ''}" placeholder="Ej: Inglés (Avanzado), Español (Nativo)" class="p-4 bg-slate-50 border rounded-2xl w-full text-sm">
                                    </div>
                                    <div class="space-y-2">
                                        <label class="text-[10px] font-black text-slate-400">INTERESES</label>
                                        <input type="text" id="cv-int" value="${cv?.intereses || ''}" placeholder="Ej: Tecnología, Diseño, Lectura" class="p-4 bg-slate-50 border rounded-2xl w-full text-sm">
                                    </div>
                                </div>
                            </div>
                        ` : `
                            <div class="bg-indigo-50 border border-indigo-200 p-8 rounded-3xl flex flex-col items-start gap-4 shadow-sm">
                                <div class="flex gap-4 items-start w-full">
                                    <div class="bg-indigo-600 text-white w-10 h-10 rounded-full flex items-center justify-center flex-shrink-0">
                                        <i class="fas fa-lock"></i>
                                    </div>
                                    <div class="w-full">
                                        <h3 class="font-black text-indigo-900 mb-2">Secciones Protegidas</h3>
                                        <p class="text-sm text-indigo-800 leading-relaxed mb-4">
                                            Tu Experiencia Laboral, Educación, Cursos y Certificaciones son validadas por la plataforma y solo pueden ser modificadas por el administrador.
                                        </p>
                                        <button type="button" onclick="document.getElementById('solicitud-box').classList.toggle('hidden')" class="bg-indigo-600 text-white px-5 py-2.5 rounded-xl text-xs font-bold hover:bg-indigo-700 transition-colors shadow-md">
                                            <i class="fas fa-paper-plane mr-1"></i> Enviar Solicitud de Actualización
                                        </button>
                                    </div>
                                </div>
                                
                                <div id="solicitud-box" class="hidden w-full mt-4 bg-white p-6 rounded-2xl border border-indigo-100 shadow-inner">
                                    <label class="block text-xs font-bold text-slate-600 mb-2">Detalles de la modificación:</label>
                                    <textarea id="sol-texto" rows="4" class="w-full p-4 bg-slate-50 border rounded-xl mb-4 text-sm focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="Ej: Por favor añadir a mi experiencia... o añadir la Habilidad: Trabajo en Equipo"></textarea>
                                    
                                    <label class="block text-xs font-bold text-slate-600 mb-2">URL del Certificado (Opcional):</label>
                                    <input type="url" id="sol-url" class="w-full p-4 bg-slate-50 border rounded-xl mb-6 text-sm focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="Enlace a tu certificado, Drive, etc.">
                                    
                                    <button type="button" onclick="enviarSolicitud('${targetUser.email}', '${targetUser.nombre}')" class="bg-emerald-500 text-white px-6 py-3 rounded-xl text-sm font-bold hover:bg-emerald-600 transition-colors w-full shadow-lg shadow-emerald-200">
                                        Enviar a Revisión
                                    </button>
                                </div>
                            </div>
                        `}

                        <button id="btn-submit" type="submit" class="w-full ${isFullAccess ? 'bg-red-600 shadow-red-200 hover:bg-red-800' : 'bg-indigo-600 shadow-indigo-200 hover:bg-slate-900'} text-white py-6 rounded-3xl font-black text-xl shadow-2xl transition-all uppercase tracking-widest">
                            ${isFullAccess ? 'Guardar Cambios como Admin' : 'Actualizar Mi Perfil Básico'}
                        </button>
                    </form>
                </div>`;

            if (isFullAccess) {
                setupDynamicButtons();
                
                // Lógica del botón de añadir nueva Habilidad
                const btnAddHab = document.getElementById('btn-add-hab');
                if(btnAddHab) {
                    btnAddHab.onclick = () => {
                        const container = document.getElementById('hab-container');
                        const div = document.createElement('div');
                        div.className = "grid grid-cols-1 md:grid-cols-2 gap-2 p-4 bg-slate-50 rounded-2xl border relative animate-fade-in";
                        div.innerHTML = `
                            <input type="text" placeholder="Habilidad (Ej: Liderazgo)" class="p-2 border rounded-lg text-sm hab-nom outline-none focus:border-indigo-400">
                            <input type="text" placeholder="Descripción breve" class="p-2 border rounded-lg text-sm hab-des outline-none focus:border-indigo-400">
                            <button type="button" onclick="this.parentElement.remove()" class="absolute -top-2 -right-2 bg-red-500 text-white w-6 h-6 rounded-full text-xs shadow">×</button>
                        `;
                        container.appendChild(div);
                    };
                }
            }

            document.getElementById('cv-full-form').onsubmit = async (e) => {
                e.preventDefault();
                try {
                    const payload = {
                        nombre: document.getElementById('cv-nombre').value,
                        profesion: document.getElementById('cv-prof').value,
                        direccion: document.getElementById('cv-dir').value,
                        telefono: document.getElementById('cv-tel').value,
                        email: targetUser.email,
                        foto: document.getElementById('cv-foto').value, 
                        redes: {
                            linkedin: document.getElementById('cv-lin').value,
                            facebook: document.getElementById('cv-fb').value,
                            instagram: document.getElementById('cv-ig').value
                        },
                        objetivo: document.getElementById('cv-obj').value,
                        info_personal: {
                            cedula: document.getElementById('cv-ced').value,
                            estado_civil: document.getElementById('cv-civil').value,
                            nacionalidad: document.getElementById('cv-nac').value,
                            nacimiento: document.getElementById('cv-birth').value
                        },
                        timestamp: serverTimestamp()
                    };

                    if (isFullAccess) {
                        const getSectionData = (id, fieldsCount, hasImage) => {
                            const rows = Array.from(document.querySelectorAll(`#${id}-container > div`));
                            const data = [];
                            for (let row of rows) {
                                const item = {};
                                for (let i = 0; i < fieldsCount; i++) {
                                    item[`f${i}`] = row.querySelector(`.${id}-field-${i}`).value;
                                }
                                if (hasImage) item.img = row.querySelector(`.${id}-img-url`).value;
                                data.push(item);
                            }
                            return data;
                        };

                        payload.experiencia = getSectionData('exp', 4, false);
                        payload.educacion = getSectionData('edu', 3, true);
                        payload.cursos = getSectionData('cur', 2, true);
                        payload.diplomados = getSectionData('dip', 2, true);
                        payload.referencias = getSectionData('ref', 4, false);
                        
                        // Recolectar Habilidades
                        payload.habilidades_lista = Array.from(document.querySelectorAll('#hab-container > div')).map(row => ({
                            nombre: row.querySelector('.hab-nom').value,
                            desc: row.querySelector('.hab-des').value
                        }));
                        
                        payload.idiomas = document.getElementById('cv-idi').value;
                        payload.intereses = document.getElementById('cv-int').value;
                    } else {
                        // Si no es admin, mantenemos intactos los arrays protegidos en la BD
                        payload.experiencia = cv?.experiencia || [];
                        payload.educacion = cv?.educacion || [];
                        payload.cursos = cv?.cursos || [];
                        payload.diplomados = cv?.diplomados || [];
                        payload.referencias = cv?.referencias || [];
                        payload.habilidades_lista = cv?.habilidades_lista || [];
                        payload.idiomas = cv?.idiomas || '';
                        payload.intereses = cv?.intereses || '';
                    }

                    if (cv) await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'cvs', cv.id), payload);
                    else await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'cvs'), payload);
                    
                    alert("¡CV actualizado con éxito!");
                    renderDashboard(targetUser, isFullAccess);
                } catch (err) { alert("Error al guardar: " + err.message); }
            };
        }

        window.enviarSolicitud = async (email, nombre) => {
            const texto = document.getElementById('sol-texto').value;
            const url = document.getElementById('sol-url').value;
            if(!texto.trim()) return alert("Debes escribir los detalles."); 
            
            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'solicitudes'), {
                    email: email,
                    nombre: nombre,
                    texto: texto,
                    link: url,
                    estado: 'pendiente',
                    fecha: new Date().toLocaleDateString(),
                    timestamp: serverTimestamp()
                });
                alert("¡Solicitud enviada con éxito! El administrador la revisará pronto.");
                document.getElementById('solicitud-box').classList.add('hidden');
            } catch(e) { alert("Error al enviar la solicitud."); }
        };

        // --- SISTEMA DE VISITAS Y PAYWALL ---
        window.showVisitas = async (cvId) => {
            if (currentUser && currentUser.tipo === 'usuario' && (!currentUser.plan || currentUser.plan === 'gratis')) {
                renderPaywall('usuario');
                return; 
            }

            const visitasSnap = await getDocs(collection(db, 'artifacts', appId, 'public', 'data', 'visitas'));
            let misVisitas = [];
            visitasSnap.forEach(d => {
                const v = d.data();
                if (v.cv_id === cvId) misVisitas.push(v);
            });
            misVisitas.reverse();

            const modal = document.createElement('div');
            modal.className = "fixed inset-0 bg-slate-900/90 flex items-center justify-center z-[100] p-4 backdrop-blur-sm animate-fade-in";
            
            let listHTML = misVisitas.length === 0 ? '<p class="text-slate-500 py-10 text-center">Aún no hay visitas registradas.</p>' : 
                misVisitas.map(v => `
                    <div class="bg-slate-50 p-4 rounded-xl border mb-3 text-left hover:border-indigo-300 transition-colors">
                        <p class="font-bold text-slate-800"><i class="fas fa-building text-indigo-500 mr-2"></i>${v.empresa_nombre || 'Empresa Anónima'}</p>
                        <p class="text-[11px] text-slate-500 mt-1"><i class="fas fa-envelope mr-2"></i>${v.empresa_email || 'Sin correo'}</p>
                        <p class="text-[10px] text-slate-400 mt-2 font-semibold"><i class="fas fa-clock mr-1"></i>${v.fecha || 'Fecha desconocida'}</p>
                    </div>
                `).join('');

            modal.innerHTML = `
                <div class="bg-white p-8 rounded-3xl text-center shadow-2xl max-w-md w-full border relative flex flex-col max-h-[85vh]">
                    <button onclick="this.closest('.fixed').remove()" class="absolute top-4 right-4 text-slate-400 hover:text-red-500"><i class="fas fa-times text-xl"></i></button>
                    <div class="w-16 h-16 bg-amber-100 text-amber-500 rounded-full flex items-center justify-center mx-auto mb-4"><i class="fas fa-chart-line text-2xl"></i></div>
                    <h3 class="font-black text-2xl mb-1 text-slate-800">Visualizaciones</h3>
                    <p class="text-sm text-slate-500 mb-6">Empresas que han escaneado tu perfil.</p>
                    <div class="overflow-y-auto pr-2 flex-1">${listHTML}</div>
                </div>`;
            document.body.appendChild(modal);
        };

        window.renderPaywall = (type) => {
            const container = document.getElementById('app-container');
            const isEmpresa = type === 'empresa';
            const tituloPro = isEmpresa ? 'Reclutador Premium' : 'Candidato PRO';
            const precio = isEmpresa ? '$19.99' : '$4.99';
            const botonVolver = isEmpresa ? "renderEmpresaDashboard(currentUser)" : "renderDashboard(currentUser)";

            container.innerHTML = `
                <div class="max-w-4xl mx-auto py-12 animate-fade-in text-center">
                    <button onclick="${botonVolver}" class="mb-8 text-slate-400 hover:text-indigo-600 flex items-center gap-2 mx-auto"><i class="fas fa-arrow-left"></i> Volver a mi panel</button>
                    <h2 class="text-4xl font-black mb-4 text-slate-800 tracking-tight">Lleva tu cuenta al <span class="text-indigo-600">Siguiente Nivel</span></h2>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8 max-w-4xl mx-auto text-left mt-10">
                        <div class="bg-white p-8 rounded-3xl border-2 border-slate-100 opacity-70 flex flex-col">
                            <h3 class="font-black text-slate-500 text-xl mb-1">Plan Básico</h3>
                            <p class="text-4xl font-black text-slate-800 mb-8">Gratis</p>
                            <button class="w-full bg-slate-100 text-slate-400 py-4 rounded-2xl font-bold cursor-not-allowed mt-auto">Tu plan actual</button>
                        </div>
                        <div class="bg-indigo-900 p-8 rounded-3xl border-4 border-indigo-400 shadow-2xl relative flex flex-col">
                            <div class="absolute -top-4 left-1/2 transform -translate-x-1/2 bg-amber-400 text-amber-900 text-[10px] font-black px-4 py-1.5 rounded-full uppercase tracking-widest shadow-md">Recomendado</div>
                            <h3 class="font-black text-indigo-300 text-xl mb-1">${tituloPro}</h3>
                            <p class="text-4xl font-black text-white mb-6">${precio}<span class="text-sm text-indigo-400 font-normal"> / mes</span></p>
                            
                            <div class="mt-auto bg-indigo-950 p-5 rounded-2xl border border-indigo-700">
                                <p class="text-xs text-indigo-300 font-bold mb-3 uppercase tracking-wider">Instrucciones de Activación:</p>
                                <ol class="text-xs text-indigo-100 space-y-3 mb-5 ml-4 list-decimal">
                                    <li>Realiza el pago correspondiente a la cuenta BHD - <b>30912740013</b>.</li>
                                    <li>Envía el comprobante por WhatsApp al <br><b><i class="fab fa-whatsapp text-green-400 mr-1 mt-1"></i> +1 829-913-5723</b></li>
                                    <li>Haz clic en el botón de abajo para notificar al administrador.</li>
                                </ol>
                                <button onclick="solicitarUpgrade()" class="w-full bg-amber-400 text-amber-900 py-4 rounded-xl font-black shadow-[0_0_15px_rgba(251,191,36,0.3)] hover:bg-amber-300 transition-colors uppercase tracking-widest text-sm">
                                    <i class="fas fa-check-circle mr-1"></i> Ya envié el comprobante
                                </button>
                            </div>
                        </div>
                    </div>
                </div>`;
        };

        window.solicitarUpgrade = async () => {
            const btn = event.target.closest('button');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Procesando...';
            
            try {
                const reqRef = collection(db, 'artifacts', appId, 'public', 'data', 'solicitudes_plan');
                const qSnap = await getDocs(reqRef);
                let yaTienePendiente = false;
                qSnap.forEach(doc => { if (doc.data().usuario_id === currentUser.id && doc.data().estado === 'pendiente') yaTienePendiente = true; });

                const mensajeWa = encodeURIComponent(`Hola, soy ${currentUser.nombre} (${currentUser.email}). Acabo de solicitar el plan PRO en LORHELS CV y adjunto mi comprobante de pago:`);
                const linkWhatsApp = `https://wa.me/18299135723?text=${mensajeWa}`;

                if (yaTienePendiente) {
                    alert("Ya tienes una solicitud en proceso. Abriremos WhatsApp por si olvidaste enviar la foto.");
                    window.open(linkWhatsApp, '_blank');
                    btn.innerHTML = originalText;
                    return;
                }

                await addDoc(reqRef, {
                    usuario_id: currentUser.id,
                    nombre: currentUser.nombre,
                    email: currentUser.email,
                    tipo_usuario: currentUser.tipo,
                    estado: 'pendiente',
                    fecha: new Date().toLocaleDateString(),
                    timestamp: serverTimestamp()
                });
                
                alert("¡Solicitud registrada! Se abrirá WhatsApp para que envíes la foto.");
                window.open(linkWhatsApp, '_blank');
                if (currentUser.tipo === 'empresa') renderEmpresaDashboard(currentUser); else renderDashboard(currentUser);
            } catch(e) { alert("Error: " + e.message); btn.innerHTML = originalText; }
        };

        // --- FUNCIONES DINÁMICAS (EDITOR Y CV) ---
        function renderEditorSection(title, id, data, placeholders, hasImage) {
            return `
                <div class="bg-white p-8 rounded-3xl border shadow-sm">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="font-black text-indigo-600 text-xs uppercase">${title}</h3>
                        <button type="button" data-section="${id}" data-fields='${JSON.stringify(placeholders)}' data-image="${hasImage}" class="btn-add-row text-xs bg-slate-900 text-white px-4 py-2 rounded-full hover:bg-indigo-600">
                            + Añadir Item
                        </button>
                    </div>
                    <div id="${id}-container" class="space-y-4">
                        ${data?.map(item => `
                            <div class="grid grid-cols-1 md:grid-cols-${placeholders.length} gap-2 p-4 bg-slate-50 rounded-2xl border relative">

            const opcionesPDF = {
                margin:       0, // Sin márgenes extra para respetar tu diseño
                filename:     `CV_${nombreCandidato.replace(/\s+/g, '_')}.pdf`, // Nombre dinámico (ej: CV_Juan_Perez.pdf)
                image:        { type: 'jpeg', quality: 0.98 },

                const fechaExpiracion = new Date();
                fechaExpiracion.setDate(fechaExpiracion.getDate() + 30);
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'usuarios_sistema', userId), { plan: 'pro', expiracion_plan: fechaExpiracion.getTime() });
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'solicitudes_plan', reqId), { estado: 'aprobado' });
                document.getElementById('pago-'+reqId).remove();
                alert("¡Cuenta activada! El usuario ahora es PRO.");
            }
        };

        window.adminProxy = (nombre, email, tipo) => {
            const targetUser = {nombre, email, tipo};
            if(tipo === 'empresa') renderEmpresaDashboard(targetUser); 
            else renderDashboard(targetUser, true);
        };

        init();
    </script>
